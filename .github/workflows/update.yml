name: Daily fashion news refresh

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC = 11:00 AM IST daily
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [feeds.json, fetch_news.py]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python fetch_news.py

      - name: Commit updated news.json
        run: |
          git config user.name "fashion-pulse-bot"
          git config user.email "actions@github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "News refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
