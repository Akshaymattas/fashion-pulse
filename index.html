<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Pulse — Daily Industry Brief</title>
<meta name="description" content="Daily fashion industry news across Global, India and Europe. Updated every morning at 11:00 IST.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,600;6..96,700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F5F1;
    --ink:#141414;
    --grey:#6E6A63;
    --hairline:#D9D6CE;
    --red:#C8102E;
    --white:#FFFFFF;
    --display:"Bodoni Moda", Georgia, serif;
    --body:"Archivo", -apple-system, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{animation:none!important;transition:none!important} }
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.55}
  a{color:inherit;text-decoration:none}
  button{font-family:var(--body);cursor:pointer;background:none;border:none;color:inherit}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px}

  /* ---------- Masthead ---------- */
  .masthead{border-bottom:2px solid var(--ink);padding:34px 20px 0;text-align:center}
  .dateline{display:flex;justify-content:space-between;max-width:1080px;margin:0 auto 14px;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey)}
  .nameplate{font-family:var(--display);font-weight:700;font-size:clamp(44px,8vw,86px);
    letter-spacing:.02em;line-height:.95}
  .nameplate em{font-style:italic;font-weight:400;color:var(--red)}
  .strapline{font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--grey);
    margin:10px 0 18px}
  .strapline b{color:var(--ink);font-weight:600}

  /* ---------- Ticker ---------- */
  .ticker{border-top:1px solid var(--hairline);border-bottom:2px solid var(--ink);
    background:var(--white);overflow:hidden;display:flex;align-items:stretch}
  .ticker-label{flex:0 0 auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;padding:8px 14px}
  .ticker-track{display:flex;gap:48px;white-space:nowrap;align-items:center;padding:8px 0;
    animation:tick 60s linear infinite}
  .ticker:hover .ticker-track{animation-play-state:paused}
  .ticker-track span{font-size:13px}
  .ticker-track span::before{content:"·";color:var(--red);margin-right:12px;font-weight:700}
  @keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ---------- Controls ---------- */
  .controls{max-width:1080px;margin:0 auto;padding:22px 20px 6px;display:flex;flex-wrap:wrap;
    gap:14px;align-items:center;justify-content:space-between}
  .tabs{display:flex;gap:2px;border:1px solid var(--ink)}
  .tab{padding:9px 22px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;
    background:var(--white);transition:background .15s,color .15s}
  .tab[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
  .tab:hover:not([aria-pressed="true"]){background:var(--hairline)}
  .search{flex:1 1 220px;max-width:320px;position:relative}
  .search input{width:100%;padding:10px 14px;border:1px solid var(--ink);background:var(--white);
    font-family:var(--body);font-size:13px}
  .search input::placeholder{color:var(--grey)}

  .chips{max-width:1080px;margin:0 auto;padding:10px 20px 4px;display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:11px;letter-spacing:.06em;padding:5px 12px;border:1px solid var(--hairline);
    background:var(--white);color:var(--grey);border-radius:999px;transition:all .15s}
  .chip[aria-pressed="true"]{border-color:var(--red);color:var(--red);font-weight:600}

  /* ---------- Layout ---------- */
  .layout{max-width:1080px;margin:0 auto;padding:18px 20px 60px;display:grid;
    grid-template-columns:minmax(0,1fr) 260px;gap:44px}
  @media(max-width:840px){.layout{grid-template-columns:1fr}}

  /* ---------- Articles ---------- */
  .count-line{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);
    border-bottom:1px solid var(--ink);padding-bottom:8px;margin-bottom:4px}
  article{padding:22px 0;border-bottom:1px solid var(--hairline)}
  .eyebrow{display:flex;gap:10px;align-items:baseline;font-size:10.5px;letter-spacing:.14em;
    text-transform:uppercase;margin-bottom:7px}
  .eyebrow .src{color:var(--red);font-weight:600}
  .eyebrow .when{color:var(--grey)}
  .eyebrow .regs{color:var(--grey);margin-left:auto}
  article h2{font-family:var(--display);font-weight:600;font-size:clamp(20px,2.6vw,25px);
    line-height:1.18;letter-spacing:.005em}
  article h2 a{border-bottom:1px solid transparent;transition:border-color .15s}
  article h2 a:hover{border-color:var(--red)}
  article p{margin-top:8px;color:#3c3a36;font-size:14px;max-width:62ch}
  .empty{padding:60px 0;text-align:center;color:var(--grey);font-family:var(--display);
    font-style:italic;font-size:20px}

  /* ---------- Sidebar ---------- */
  aside h3{font-size:11px;letter-spacing:.16em;text-transform:uppercase;border-bottom:1px solid var(--ink);
    padding-bottom:8px;margin-bottom:14px;font-weight:600}
  aside section{margin-bottom:36px}
  .ref{display:block;padding:12px 0;border-bottom:1px solid var(--hairline)}
  .ref b{display:block;font-family:var(--display);font-size:16.5px;font-weight:600;line-height:1.2}
  .ref b:hover{color:var(--red)}
  .ref small{color:var(--grey);font-size:12px;line-height:1.4;display:block;margin-top:3px}
  .srcline{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;
    border-bottom:1px dotted var(--hairline);color:var(--grey)}
  .srcline b{color:var(--ink);font-weight:500}

  footer{border-top:2px solid var(--ink);padding:26px 20px;text-align:center;font-size:11px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--grey)}
</style>
</head>
<body>

<header class="masthead">
  <div class="dateline">
    <span id="today"></span>
    <span>Daily · 11:00 IST</span>
  </div>
  <h1 class="nameplate">FASHION <em>Pulse</em></h1>
  <p class="strapline">The category manager's brief — <b>Global · India · Europe</b> — <span id="updated">loading…</span></p>
</header>

<div class="ticker" aria-hidden="true">
  <div class="ticker-label">Latest wire</div>
  <div class="ticker-track" id="ticker"></div>
</div>

<div class="controls">
  <div class="tabs" role="group" aria-label="Filter by region">
    <button class="tab" data-region="All" aria-pressed="true">All</button>
    <button class="tab" data-region="Global" aria-pressed="false">Global</button>
    <button class="tab" data-region="India" aria-pressed="false">India</button>
    <button class="tab" data-region="Europe" aria-pressed="false">Europe</button>
  </div>
  <div class="search">
    <input id="q" type="search" placeholder="Search headlines — e.g. Zara, sourcing, EPR" aria-label="Search headlines">
  </div>
</div>

<div class="chips" id="chips" role="group" aria-label="Filter by source"></div>

<main class="layout">
  <div>
    <p class="count-line" id="countline"></p>
    <div id="list"></div>
  </div>
  <aside>
    <section>
      <h3>Reference desks</h3>
      <div id="refs"></div>
    </section>
    <section>
      <h3>Today's sources</h3>
      <div id="srcstats"></div>
    </section>
  </aside>
</main>

<footer>Auto-refreshed daily via GitHub Actions · Headlines link to original publishers</footer>

<script>
(async function(){
  const $=id=>document.getElementById(id);
  $("today").textContent=new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  let data;
  try{
    const res=await fetch("data/news.json?t="+Date.now());
    data=await res.json();
  }catch(e){
    $("list").innerHTML='<p class="empty">Could not load data/news.json — run fetch_news.py or check the Actions tab.</p>';
    return;
  }

  $("updated").textContent="Updated "+data.updated_at;

  // Reference links
  $("refs").innerHTML=(data.reference_links||[]).map(r=>
    `<a class="ref" href="${r.url}" target="_blank" rel="noopener"><b>${r.name}</b><small>${r.note||""}</small></a>`).join("");

  // Ticker (duplicated for seamless loop)
  const latest=data.items.slice(0,10).map(i=>`<span>${esc(i.title)}</span>`).join("");
  $("ticker").innerHTML=latest+latest;

  // Source chips + sidebar stats
  const counts={};
  data.items.forEach(i=>counts[i.source]=(counts[i.source]||0)+1);
  const sources=Object.keys(counts).sort();
  $("chips").innerHTML=sources.map(s=>
    `<button class="chip" data-src="${esc(s)}" aria-pressed="false">${esc(s)}</button>`).join("");
  $("srcstats").innerHTML=sources.map(s=>
    `<div class="srcline"><b>${esc(s)}</b><span>${counts[s]}</span></div>`).join("");

  let region="All", activeSrc=new Set(), query="";

  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    region=t.dataset.region;
    document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-pressed",x===t));
    render();
  }));
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    const s=c.dataset.src;
    activeSrc.has(s)?activeSrc.delete(s):activeSrc.add(s);
    c.setAttribute("aria-pressed",activeSrc.has(s));
    render();
  }));
  $("q").addEventListener("input",e=>{query=e.target.value.toLowerCase().trim();render();});

  function ago(iso){
    if(!iso) return "";
    const m=Math.round((Date.now()-new Date(iso))/60000);
    if(m<60) return m+"m ago";
    if(m<1440) return Math.round(m/60)+"h ago";
    return new Date(iso).toLocaleDateString("en-IN",{day:"numeric",month:"short"});
  }
  function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

  function render(){
    const rows=data.items.filter(i=>
      (region==="All"||i.regions.includes(region)) &&
      (activeSrc.size===0||activeSrc.has(i.source)) &&
      (!query||(i.title+" "+i.summary).toLowerCase().includes(query))
    );
    $("countline").textContent=rows.length+" stories · "+(region==="All"?"all regions":region);
    $("list").innerHTML=rows.length?rows.map(i=>`
      <article>
        <div class="eyebrow">
          <span class="src">${esc(i.source)}</span>
          <span class="when">${ago(i.published)}</span>
          <span class="regs">${i.regions.join(" / ")}</span>
        </div>
        <h2><a href="${i.link}" target="_blank" rel="noopener">${esc(i.title)}</a></h2>
        ${i.summary?`<p>${esc(i.summary)}</p>`:""}
      </article>`).join("")
    :'<p class="empty">Nothing matches — clear a filter or try another term.</p>';
  }
  render();
})();
</script>
</body>
</html>
